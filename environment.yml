# environment.yml — Spaceflight–Disease Network Separation Pipeline
#
# Create the environment with:
#   conda env create -f environment.yml
#   conda activate spaceflight-netsep
#
# Update an existing environment:
#   conda env update -f environment.yml --prune
#
# ── Python version ────────────────────────────────────────────────────────────
# Use Python 3.10 or 3.11.
#
# NetMedPy declares Requires-Python >=3.8,<3.12 in its package metadata.
# Although Ray itself supports 3.12+ from v2.31.0, NetMedPy has not lifted
# its ceiling yet. Pin Python to <3.12 until a future NetMedPy release
# explicitly supports it.

name: spaceflight-netsep

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python>=3.10,<3.12      # 3.10 or 3.11 only — see note above

  # ── Core scientific stack ─────────────────────────────────────────────────
  - numpy>=1.24,<3.0
  - pandas>=2.0,<3.0
  - scipy>=1.11,<2.0
  - statsmodels>=0.14,<1.0

  # ── Network analysis ──────────────────────────────────────────────────────
  - networkx>=3.1,<4.0

  # ── File I/O ──────────────────────────────────────────────────────────────
  - openpyxl>=3.1,<4.0     # .xlsx read/write (pandas read_excel backend)
  - joblib>=1.3,<2.0       # legacy pickle fallback in utils.load()

  # ── System utilities ──────────────────────────────────────────────────────
  - psutil>=5.9,<7.0

  # ── Visualisation ─────────────────────────────────────────────────────────
  - matplotlib>=3.7,<4.0

  # ── Jupyter ───────────────────────────────────────────────────────────────
  - jupyterlab>=4.0,<5.0
  - ipykernel

  # ── pip-only packages ─────────────────────────────────────────────────────
  # netmedpy, pronto, ray, and mygene are not on conda-forge; install via pip.
  - pip
  - pip:
      # Pin to 0.1.x: separation_z_score API may change in 0.2.x.
      # NetMedPy declares Requires-Python >=3.8,<3.12 — see note above.
      - netmedpy>=0.1.4,<0.2.0

      # pronto 2.x rewrote the API vs 1.x. Latest stable: 2.7.3.
      - pronto>=2.5,<3.0

      # NetMedPy 0.1.x calls ray._private.utils.get_ray_temp_dir,
      # removed in Ray 2.20. Pin to last compatible release.
      - ray==2.10.0          

      # Optional fallback for gene ID mapping.
      - mygene>=3.2,<4.0
